<div class="container-fluid login-page position-relative">
  <a routerLink="/" class="back-btn">
    <i class="bi bi-arrow-left me-2"></i> Go back
  </a>
  <div class="row m-0">
    <div class="col-12 col-md-10 login-container">
      <app-auth-form 
        (submitLogin)="handleLogin($event)" 
        [errorMessage]="error()">
      </app-auth-form>
    </div>
  </div>
</div>
