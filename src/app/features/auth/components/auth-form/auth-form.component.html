<div class="big-container">
  <div class="green-bar"></div>

  <div class="form-container">
    <div class="row mb-3">
      <div class="col text-center">
        <img src="/logo.png" alt="logo" class="img-fluid logo" />
        <h4 class="title">{{ mode === "login" ? "Sign In" : "Register" }}</h4>
      </div>
    </div>
    <form [formGroup]="authForm" (ngSubmit)="onSubmit()" class="login-form">
      <div class="mb-3">
        <label class="form-label">Mail</label>
        <input
          type="email"
          class="form-control"
          formControlName="email"
          placeholder="mail@example.com"
        />
        @if (authForm.get("email")?.touched && authForm.get("email")?.invalid) {
          <small
            class="text-danger"
          >
            Invalid mail
          </small>
        }
      </div>

      <div class="mb-3">
        <label class="form-label">Password</label>
        <input
          type="password"
          class="form-control"
          formControlName="password"
        />
        @if (
          authForm.get("password")?.touched && authForm.get("password")?.invalid
        ) {
          <small class="text-danger">6 characters minimum</small>
        }
      </div>

      <button class="btn w-100" type="submit">
        {{ mode === "login" ? "Sign In" : "Register" }}
      </button>

      <span class="separator"></span>
      
      <button class="change-mode" (click)="toggleMode()">
        {{
          mode === "login" ? "Create an account" : "Already have an account?"
        }}
      </button>
    </form>
  </div>
</div>
