<div class="container-fluid favorite-section py-5">
  <div class="row">
    <div
      class="container-fluid favorite-info col-12 col-md-8 d-flex flex-column position-relative mt-2"
    >
      <h2 class="cursive-title">Customer favorite</h2>
      <h3 class="favorite-text">Latte & Chip brownies</h3>
      <div class="mt-4">
        <div class="brownies-images row position-relative d-flex">
          <div
            class="col-5 d-none d-md-block animate-bottom"
            [class.animate-in]="animateIn()"
          >
            <img
              src="coffee-and-brownies-2.webp"
              alt="coffe-and-brownies"
              class="img-fluid"
            />
          </div>
          <div
            class="col-5 position-relative d-none d-md-flex animate-bottom"
            [class.animate-in]="animateIn()"
          >
            <div class="overlay position-absolute top-0 start-0"></div>
            <div
              class="overlay-2 position-absolute top-0 start-0 d-flex flex-column justify-content-center align-items-center"
            >
              <h2 class="sells-text sells-count m-0 p-0">500+</h2>
              <p class="sells-text m-0 p-0">SELLS</p>
            </div>
            <img
              src="glazing-brownies.jpg"
              alt="glazing-brownies"
              class="img-fluid"
            />
          </div>
          <div class="d-block d-md-none">
            <img
              src="coffee-and-brownies.jpg"
              alt="coffee-and-brownies"
              class="img-fluid coffee-and-brownies"
            />
          </div>
        </div>
      </div>
    </div>
    <div class="col-4 d-none d-md-block">
      <span class="white-circle span-highlight" [class.animate-in]="animateIn()">
        <img src="coffee-splash.png" alt="coffee-splash" class="img-fluid" />
      </span>
    </div>
  </div>
</div>
