<div class="cart-container">
  <h2>Your Cart</h2>

  <div class="cart-items-list">
    @if (cartItems().length === 0) {
      <div class="empty-cart">Your cart is empty.</div>
    }

    @for (item of cartItems(); track item.id) {
      <div class="cart-item">
        <div class="item-img-wrapper">
          <img [src]="item.img_path" alt="{{ item.name }}" class="item-image" />
        </div>

        <div class="item-info">
          <h3>{{ item.name }}</h3>
          <p class="price">{{ item.price | currency:'USD' }}</p>
        </div>

        <div class="item-actions">
          <button
            class="qty-btn"
            (click)="updateQuantity(item.id, item.quantity - 1)"
          >
            <i class="bi bi-dash-lg"></i>
          </button>
          <span class="qty-display">{{ item.quantity }}</span>
          <button
            class="qty-btn"
            (click)="updateQuantity(item.id, item.quantity + 1)"
          >
            <i class="bi bi-plus-lg"></i>
          </button>
          <button class="remove-btn" (click)="removeItem(item.id)">
            <i class="bi bi-trash-fill"></i>
          </button>
        </div>
      </div>
    }
  </div>

  <div class="cart-summary" *ngIf="cartItems().length > 0">
    <div class="total">
      Total: <strong>{{ total() | currency:'USD' }}</strong>
    </div>
    <button class="checkout-btn" (click)="goToCheckout()">Checkout</button>
  </div>
</div>
